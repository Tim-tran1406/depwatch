version: 2
updates:
  # depwatch's own Python dependencies. The packages in data/requirements-sample.txt
  # are a deliberately-outdated demo fixture, not real dependencies, so they are
  # ignored here — otherwise Dependabot tries to "fix" the very risks the sample
  # exists to demonstrate.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "flask"
      - dependency-name: "urllib3"
      - dependency-name: "numpy"
      - dependency-name: "pyyaml"
      - dependency-name: "requests"

  # The actions used in the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

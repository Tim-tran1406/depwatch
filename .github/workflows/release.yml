name: release

# Publishes depwatch to PyPI via Trusted Publishing (OIDC) — no stored token.
# Manual-only for now: the "depwatch" name is already taken on PyPI by an
# unrelated project, so auto-publishing on every release would just fail. To
# enable it, rename the distribution in pyproject.toml to a free name, configure
# a PyPI trusted publisher for that name (this repo, workflow "release.yml",
# environment "pypi"), then add back the `release: [published]` trigger below.

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build the package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

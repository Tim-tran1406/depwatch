name: release

# Publishes depwatch to PyPI when a GitHub Release is published. Uses PyPI
# Trusted Publishing (OIDC), so there is no API token to store: configure the
# trusted publisher on PyPI once (project "depwatch", this repo, workflow
# "release.yml", environment "pypi"). Until that is set up, this does nothing.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build the package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

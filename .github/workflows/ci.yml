name: ci

# Runs the same checks as local development — lint, format, types, tests — on
# every push and pull request. The tests stub out the network, so this is fast
# and never flaky.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src tests

      - name: Format
        run: uv run ruff format --check src tests

      - name: Types
        run: uv run mypy src

      - name: Tests
        run: uv run pytest -q

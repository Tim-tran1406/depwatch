name: "depwatch dependency risk"
description: "Scan a requirements file and flag the dependencies that are genuinely risky."
branding:
  icon: "shield"
  color: "purple"

inputs:
  requirements:
    description: "Path to the requirements file to scan."
    required: false
    default: "requirements.txt"
  fail-on:
    description: "Fail the job when the worst risk reaches this band: off, moderate, high, critical."
    required: false
    default: "high"
  limit:
    description: "How many of the riskiest packages to list in the summary."
    required: false
    default: "10"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install depwatch
      shell: bash
      run: pip install "${{ github.action_path }}"

    # The two scans below share one cache dir, so the second reads the first's
    # cached API responses instead of hitting the network again. The token lifts
    # the GitHub API rate limit so contributor counts work on real projects.
    - name: Scan dependencies (SARIF)
      shell: bash
      env:
        DEPWATCH_GITHUB_TOKEN: ${{ github.token }}
        DEPWATCH_CACHE_DIR: ${{ runner.temp }}/depwatch-cache
      run: |
        depwatch scan "${{ inputs.requirements }}" \
          --no-save --format sarif --output depwatch.sarif

    - name: Upload findings to code scanning
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: depwatch.sarif

    - name: Write summary and gate
      shell: bash
      env:
        DEPWATCH_GITHUB_TOKEN: ${{ github.token }}
        DEPWATCH_CACHE_DIR: ${{ runner.temp }}/depwatch-cache
      run: |
        depwatch scan "${{ inputs.requirements }}" \
          --no-save \
          --format markdown \
          --limit "${{ inputs.limit }}" \
          --fail-on "${{ inputs.fail-on }}" >> "$GITHUB_STEP_SUMMARY"
